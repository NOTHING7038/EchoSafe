version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:8.0
    container_name: echosafe-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: echosafe
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - echosafe-network

  # EchoSafe Backend API
  echosafe-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: echosafe-api
    restart: unless-stopped
    environment:
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017
      - MONGODB_DB=echosafe
      - JWT_SECRET=your-production-jwt-secret-change-this
      - JWT_EXPIRE_HOURS=24
      - DEFAULT_ADMIN_USER=admin
      - DEFAULT_ADMIN_PASSWORD=Admin@7038!
    ports:
      - "8000:8000"
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app/backend
      - ./ai_model:/app/ai_model
    networks:
      - echosafe-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: echosafe-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - .:/usr/share/nginx/html:ro
    depends_on:
      - echosafe-api
    networks:
      - echosafe-network

volumes:
  mongodb_data:
    driver: local

networks:
  echosafe-network:
    driver: bridge
