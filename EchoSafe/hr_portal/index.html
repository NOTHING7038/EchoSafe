<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EchoSafe - HR Investigator Portal</title>
    <style>
        :root {
            --bg-1: #0f1f3d;
            --bg-2: #17305b;
            --panel: #f5f7fb;
            --ink: #0f172a;
            --primary: #1d4ed8;
            --card: #ffffff;
            --border: #dbe3f4;
            --table-header: #f8fafc;
            --modal-bg: rgba(0,0,0,0.5);
        }
        body.dark-mode {
            --bg-1: #93c5fd;
            --panel: #0f172a;
            --ink: #f1f5f9;
            --card: #1e293b;
            --border: #334155;
            --table-header: #0f172a;
            --modal-bg: rgba(255,255,255,0.1);
        }
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: var(--panel) radial-gradient(circle at 15% 20%, rgba(29, 78, 216, 0.05) 0%, transparent 40%);
            color: var(--ink);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }
        .container {
            background: var(--card);
            width: 100%;
            max-width: 900px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            margin-top: 40px;
            transition: all 0.3s ease;
        }
        h1, h2, h3 { margin-top: 0; color: var(--bg-1); }
        input { padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid var(--border); width: 100%; box-sizing: border-box; background: var(--card); color: var(--ink); }
        button { background: var(--primary); padding: 10px 15px; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { opacity: 0.9; }
        .header-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--border); padding-bottom: 10px; }
        .nav-buttons { display: flex; gap: 10px; }
        .nav-buttons button { width: auto; }
        #logoutBtn { background: #ef4444; }
        #themeToggleBtn { background: #64748b; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--table-header); }
        
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 12px; font-weight: bold; color: white; text-transform: uppercase;}
        .badge.high { background: #ef4444; }
        .badge.medium { background: #f59e0b; }
        .badge.low { background: #10b981; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-bg); place-items: center; backdrop-filter: blur(2px); }
        .modal-content { background: var(--card); padding: 30px; border-radius: 12px; max-width: 600px; width: 90%; border: 1px solid var(--border); }
        .actions { display: flex; gap: 10px; margin-top: 20px;}
        .actions button { width: auto; flex: 1; }
        .btn-secondary { background: #64748b; }
        #modalReportText { background: var(--panel) !important; color: var(--ink); border-color: var(--border) !important; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-nav">
            <h2>HR Investigator Dashboard</h2>
            <div class="nav-buttons">
                <button id="themeToggleBtn" onclick="toggleTheme()">🌙 Theme</button>
                <button id="logoutBtn" style="display:none;" onclick="logout()">Logout</button>
            </div>
        </div>

        <!-- Login View -->
        <div id="loginSection">
            <p>Please log in with your credentials to decrypt and view reports.</p>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Secure Login</button>
            </form>
        </div>

        <!-- Dashboard View -->
        <div id="dashboardSection" style="display: none;">
            <table>
                <thead>
                    <tr>
                        <th>Date Submitted</th>
                        <th>AI Urgency</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="reportsTable">
                    <!-- Populated by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Decryption Modal -->
    <div id="caseModal" class="modal">
        <div class="modal-content">
            <h3>Decrypted Case Details</h3>
            <p><strong>Case ID:</strong> <span id="modalCaseId" style="font-family: monospace; font-size: 12px;"></span></p>
            <p><strong>Submitted:</strong> <span id="modalDate"></span></p>
            <div style="background:#f8fafc; padding:15px; border-radius:5px; margin: 15px 0; border: 1px solid #e2e8f0; line-height: 1.5;" id="modalReportText"></div>
            
            <h4>Update Investigation Status</h4>
            <div class="actions">
                <button onclick="updateStatus('investigating')">Mark Investigating</button>
                <button onclick="updateStatus('resolved')" style="background: #10b981;">Mark Resolved</button>
                <button class="btn-secondary" onclick="closeModal()">Close</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8000/api";
        let token = localStorage.getItem('hr_token');
        let currentCaseId = null;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch(`${API_BASE}/hr/login`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if (res.ok) {
                    token = data.token;
                    localStorage.setItem('hr_token', token);
                    showDashboard();
                } else { alert(data.detail || 'Login failed. Check credentials.'); }
            } catch (err) { alert('Cannot connect to backend API on port 8000.'); }
        });

        async function showDashboard() {
            if (!token) return;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('dashboardSection').style.display = 'block';
            document.getElementById('logoutBtn').style.display = 'block';
            
            const res = await fetch(`${API_BASE}/hr/dashboard`, { headers: {'Authorization': `Bearer ${token}`} });
            const data = await res.json();
            
            if (res.ok) {
                const tbody = document.getElementById('reportsTable');
                tbody.innerHTML = '';
                data.reports.forEach(r => {
                    let uClass = r.urgency_score > 0.6 ? 'high' : (r.urgency_score > 0.3 ? 'medium' : 'low');
                    let uText = r.urgency_score > 0.6 ? 'High' : (r.urgency_score > 0.3 ? 'Medium' : 'Low');
                    tbody.innerHTML += `<tr>
                        <td>${new Date(r.created_at).toLocaleString()}</td>
                        <td><span class="badge ${uClass}">${uText}</span></td>
                        <td><strong>${r.status}</strong></td>
                        <td><button onclick="viewCase('${r.case_id}')">Decrypt</button></td>
                    </tr>`;
                });
            } else { logout(); } // Token expired
        }

        async function viewCase(caseId) {
            currentCaseId = caseId;
            const res = await fetch(`${API_BASE}/hr/decrypt_report`, {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({case_id: caseId})
            });
            const data = await res.json();
            if (res.ok) {
                document.getElementById('modalCaseId').textContent = data.case_id;
                document.getElementById('modalDate').textContent = new Date(data.created_at).toLocaleString();
                document.getElementById('modalReportText').textContent = data.report_text;
                document.getElementById('caseModal').style.display = 'grid';
            } else { alert('Failed to decrypt report.'); }
        }

        async function updateStatus(status) {
            const res = await fetch(`${API_BASE}/hr/update_status`, {
                method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({case_id: currentCaseId, status: status})
            });
            if (res.ok) { closeModal(); showDashboard(); }
        }

        function closeModal() { document.getElementById('caseModal').style.display = 'none'; }
        function logout() { token = null; localStorage.removeItem('hr_token'); window.location.reload(); }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('hr_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        }
        if (localStorage.getItem('hr_theme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        if (token) showDashboard(); // Auto-login if token exists
    </script>
</body>
</html>
